name: Container Build and Publish

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-container:
    name: Build Container Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set image name to lowercase
        id: image_name
        run: |
          echo "value=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Sanitize cache scope
        id: cache_scope
        run: |
          # Replace slashes with hyphens for valid Docker tag format
          echo "value=$(echo '${{ github.ref_name }}' | tr '/' '-' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          # Enable containerd image store for better performance
          driver-opts: |
            image=moby/buildkit:buildx-stable-1
          # Use local cache for better performance
          buildkitd-flags: --allow-insecure-entitlement security.insecure --allow-insecure-entitlement network.host

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}
          tags: |
            # Tag with 'latest' on main branch
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag with version on tags (e.g., v1.0.0 -> 1.0.0)
            type=semver,pattern={{version}}
            # Tag with major.minor on tags (e.g., v1.0.0 -> 1.0)
            type=semver,pattern={{major}}.{{minor}}
            # Tag with major version on tags (e.g., v1.0.0 -> 1)
            type=semver,pattern={{major}}
            # Tag with git sha for PRs
            type=sha,enable=${{ github.event_name == 'pull_request' }}

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          # Push only on main branch or tags, not on PRs
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache strategy: GHA cache for PRs, GHA + registry for authenticated builds
          cache-from: |
            type=gha,scope=${{ steps.cache_scope.outputs.value }}
            type=gha,scope=main
            ${{ github.event_name != 'pull_request' && format('type=registry,ref={0}/{1}:cache-{2}', env.REGISTRY, steps.image_name.outputs.value, steps.cache_scope.outputs.value) || '' }}
            ${{ github.event_name != 'pull_request' && format('type=registry,ref={0}/{1}:cache-main', env.REGISTRY, steps.image_name.outputs.value) || '' }}
          cache-to: |
            type=gha,scope=${{ steps.cache_scope.outputs.value }},mode=max
            ${{ github.event_name != 'pull_request' && format('type=registry,ref={0}/{1}:cache-{2},mode=max', env.REGISTRY, steps.image_name.outputs.value, steps.cache_scope.outputs.value) || '' }}
          # Build performance optimizations
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          # Disable provenance to avoid multi-arch manifest issues
          provenance: false

      - name: Test container image
        if: github.event_name == 'pull_request'
        run: |
          # Extract the image reference for testing
          IMAGE_REF=$(echo '${{ steps.meta.outputs.tags }}' | head -n1)

          echo "### Container Build Test :gear:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Test AMD64 architecture
          echo "Testing AMD64 architecture..." >> "$GITHUB_STEP_SUMMARY"
          if docker run --rm --platform linux/amd64 "${IMAGE_REF}" logcheck-filter --version 2>/dev/null; then
            echo "✅ AMD64 architecture test passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ AMD64 architecture test failed" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Build Performance:**" >> "$GITHUB_STEP_SUMMARY"
          echo "- cargo-chef for optimal dependency caching" >> "$GITHUB_STEP_SUMMARY"
          echo "- Advanced caching with multi-source fallback" >> "$GITHUB_STEP_SUMMARY"
          echo "- Separate cache scopes for optimal performance" >> "$GITHUB_STEP_SUMMARY"

      - name: Summary
        if: github.event_name != 'pull_request'
        run: |
          echo "### Container Image Published :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Registry:** ${{ env.REGISTRY }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image:** ${{ steps.image_name.outputs.value }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tags:**" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Pull command:**" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull $(echo '${{ steps.meta.outputs.tags }}' | head -n1)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Architecture:**" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ linux/amd64 (Intel/AMD x86_64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Performance Optimizations:**" >> "$GITHUB_STEP_SUMMARY"
          echo "- 🚀 cargo-chef for optimal dependency caching" >> "$GITHUB_STEP_SUMMARY"
          echo "- 💾 Advanced caching with registry + GHA fallback" >> "$GITHUB_STEP_SUMMARY"
          echo "- 📦 Optimized layer caching for Rust dependencies" >> "$GITHUB_STEP_SUMMARY"

      - name: Summary (PR)
        if: github.event_name == 'pull_request'
        run: |
          echo "### Container Build Validation :white_check_mark:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Container image built successfully for validation." >> "$GITHUB_STEP_SUMMARY"
          echo "Image will be pushed to registry after merge to main branch." >> "$GITHUB_STEP_SUMMARY"
