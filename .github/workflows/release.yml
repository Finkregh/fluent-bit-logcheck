name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true

  build-cli-linux:
    name: Build CLI - ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            archive-name: logcheck-filter-linux-amd64.tar.gz
            use-cross: false
          - target: aarch64-unknown-linux-gnu
            archive-name: logcheck-filter-linux-arm64.tar.gz
            use-cross: true

    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        if: ${{ !matrix.use-cross }}
        with:
          targets: ${{ matrix.target }}

      - name: Build CLI natively with xtask
        if: ${{ !matrix.use-cross }}
        run: cargo xtask build-cli --release

      - name: Build CLI with cross-compilation
        if: ${{ matrix.use-cross }}
        uses: houseabsolute/actions-rust-cross@v1
        with:
          target: ${{ matrix.target }}
          command: build
          args: "--locked --release --bin logcheck-filter"
          strip: true
          use-rust-cache: true

      - name: Create archive
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ matrix.archive-name }} logcheck-filter
          mv ${{ matrix.archive-name }} ${{ github.workspace }}/

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive-name }}

  build-cli-macos:
    name: Build CLI - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-15-intel # Intel runners
            archive-name: logcheck-filter-darwin-amd64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest # Apple Silicon runners
            archive-name: logcheck-filter-darwin-arm64.tar.gz

    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          targets: ${{ matrix.target }}

      - name: Build CLI natively with xtask
        run: cargo xtask build-cli --release

      - name: Create archive
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ matrix.archive-name }} logcheck-filter
          mv ${{ matrix.archive-name }} ${{ github.workspace }}/

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive-name }}

  build-wasm:
    name: Build WASM Filter
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          targets: wasm32-unknown-unknown

      - name: Build WASM filter with xtask
        run: cargo xtask build-wasm --release

      - name: Create archive
        run: |
          cd target/wasm32-unknown-unknown/release
          tar czf fluentbit-wasm-filter.tar.gz logcheck_fluent_bit_filter.wasm
          mv fluentbit-wasm-filter.tar.gz ${{ github.workspace }}/

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: fluentbit-wasm-filter.tar.gz
