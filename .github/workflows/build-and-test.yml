name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy Lints
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Run Clippy Check
        uses: actions-rs/clippy-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          args: --all-targets --all-features -- -D warnings
          name: "clippy"

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Run tests
        run: cargo test --all-features

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [format, clippy]
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin
      
      - name: Run tarpaulin
        run: |
          cargo tarpaulin \
            --workspace \
            --timeout 300 \
            --out xml \
            --out lcov \
            --output-dir target/coverage/ \
            --exclude-files target/* \
            --exclude-files build.rs \
            --all-features
      
      # Comment out codecov upload as requested
      # - name: Upload to codecov.io
      #   uses: codecov/codecov-action@v4
      #   with:
      #     file: target/coverage/cobertura.xml
      
      - name: Archive coverage results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            target/coverage/cobertura.xml
            target/coverage/lcov.info
          retention-days: 30

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      
      - name: Security Audit
        uses: actions-rs/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  bloat-check:
    name: Binary Size Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Run Cargo Bloat
        uses: orf/cargo-bloat-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          bloat_args: "--release --crates"

  build-cli:
    name: Build CLI - ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: [format, clippy, test, coverage]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            binary-suffix: ''
          - target: x86_64-unknown-linux-musl
            binary-suffix: ''
          - target: aarch64-unknown-linux-gnu
            binary-suffix: ''
          - target: aarch64-unknown-linux-musl
            binary-suffix: ''
          - target: x86_64-pc-windows-msvc
            binary-suffix: '.exe'
          - target: x86_64-apple-darwin
            binary-suffix: ''
          - target: aarch64-apple-darwin
            binary-suffix: ''

    steps:
      - uses: actions/checkout@v4
      
      - name: Build CLI with cross-compilation
        uses: houseabsolute/actions-rust-cross@v1
        with:
          target: ${{ matrix.target }}
          command: build
          args: "--locked --release --bin logcheck-filter"
          strip: true
          use-rust-cache: true
      
      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: logcheck-filter-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/logcheck-filter${{ matrix.binary-suffix }}
          retention-days: 30

  build-wasm:
    name: Build WASM Filter
    runs-on: ubuntu-latest
    needs: [format, clippy, test, coverage]
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-unknown-unknown
      
      - name: Build WASM filter
        run: cargo build --release --target wasm32-unknown-unknown --lib
      
      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: fluentbit-wasm-filter
          path: target/wasm32-unknown-unknown/release/fluentbit_rustwasmfilter.wasm
          retention-days: 30

  build-plugin:
    name: Build Plugin (.so) - ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: [format, clippy, test, coverage]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            lib-extension: 'so'
          - target: x86_64-unknown-linux-musl
            lib-extension: 'so'
          - target: aarch64-unknown-linux-gnu
            lib-extension: 'so'
          - target: aarch64-unknown-linux-musl
            lib-extension: 'so'
          - target: x86_64-apple-darwin
            lib-extension: 'dylib'
          - target: aarch64-apple-darwin
            lib-extension: 'dylib'

    steps:
      - uses: actions/checkout@v4
      
      - name: Build shared library with cross-compilation
        uses: houseabsolute/actions-rust-cross@v1
        with:
          target: ${{ matrix.target }}
          command: build
          args: "--locked --release --lib"
          strip: true
          use-rust-cache: true
      
      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: liblogcheck_fluent_bit_filter-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/liblogcheck_fluent_bit_filter.${{ matrix.lib-extension }}
          retention-days: 30
