name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Run tests
        run: cargo test --all-features

  build-cli:
    name: Build CLI - ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: [format, clippy, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            binary-suffix: ''
          - target: x86_64-unknown-linux-musl
            binary-suffix: ''
          - target: aarch64-unknown-linux-gnu
            binary-suffix: ''
          - target: aarch64-unknown-linux-musl
            binary-suffix: ''
          - target: x86_64-pc-windows-msvc
            binary-suffix: '.exe'
          - target: x86_64-apple-darwin
            binary-suffix: ''
          - target: aarch64-apple-darwin
            binary-suffix: ''

    steps:
      - uses: actions/checkout@v4
      
      - name: Build CLI with cross-compilation
        uses: houseabsolute/actions-rust-cross@v1
        with:
          target: ${{ matrix.target }}
          command: build
          args: "--locked --release --bin logcheck-filter"
          strip: true
          use-rust-cache: true
      
      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: logcheck-filter-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/logcheck-filter${{ matrix.binary-suffix }}
          retention-days: 30

  build-wasm:
    name: Build WASM Filter
    runs-on: ubuntu-latest
    needs: [format, clippy, test]
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-unknown-unknown
      
      - name: Build WASM filter
        run: cargo build --release --target wasm32-unknown-unknown --lib
      
      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: fluentbit-wasm-filter
          path: target/wasm32-unknown-unknown/release/fluentbit_rustwasmfilter.wasm
          retention-days: 30

  build-plugin:
    name: Build Plugin (.so) - ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: [format, clippy, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            lib-extension: 'so'
          - target: x86_64-unknown-linux-musl
            lib-extension: 'so'
          - target: aarch64-unknown-linux-gnu
            lib-extension: 'so'
          - target: aarch64-unknown-linux-musl
            lib-extension: 'so'
          - target: x86_64-apple-darwin
            lib-extension: 'dylib'
          - target: aarch64-apple-darwin
            lib-extension: 'dylib'

    steps:
      - uses: actions/checkout@v4
      
      - name: Build shared library with cross-compilation
        uses: houseabsolute/actions-rust-cross@v1
        with:
          target: ${{ matrix.target }}
          command: build
          args: "--locked --release --lib"
          strip: true
          use-rust-cache: true
      
      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: liblogcheck_fluent_bit_filter-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/liblogcheck_fluent_bit_filter.${{ matrix.lib-extension }}
          retention-days: 30
