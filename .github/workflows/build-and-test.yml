name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          targets: wasm32-unknown-unknown

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy Lints
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Run Clippy Check
        uses: actions-rs/clippy-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          args: --all-targets --all-features -- -D warnings
          name: "clippy"

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all-features --target x86_64-unknown-linux-gnu

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [format, clippy]
    permissions:
      contents: read
      issues: write
      pull-requests: write
    outputs:
      summary_path: ${{ steps.coverage-summary.outputs.summary_path }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: llvm-tools

      - uses: Swatinem/rust-cache@v2

      - name: Restore ReportGenerator history cache
        uses: actions/cache@v4
        with:
          path: .coverage-history
          key: coverage-history-${{ github.ref_name }}
          restore-keys: |
            coverage-history-

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin

      - name: Run coverage with xtask
        run: cargo xtask coverage

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x
          dotnet-quality: 'ga'

      - name: ReportGenerator
        uses: danielpalme/ReportGenerator-GitHub-Action@5.5.1
        with:
          reports: target/coverage/cobertura.xml
          targetdir: target/coverage/report
          reporttypes: Html;HtmlChart;Markdown;MarkdownSummary;MarkdownSummaryGithub
          historydir: .coverage-history
          title: 'Coverage for fluent-bit-logcheck'

      - name: Publish coverage summary to job output
        id: coverage-summary
        run: echo "summary_path=target/coverage/report/SummaryGithub.md" >> $GITHUB_OUTPUT

      - name: Publish coverage summary to job summary
        run: cat target/coverage/report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Comment coverage summary on PR
        if: github.event_name == 'pull_request'
        run: gh pr comment ${{ github.event.number }} --edit-last --create-if-none --body-file target/coverage/report/SummaryGithub.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Comment out codecov upload as requested
      # - name: Upload to codecov.io
      #   uses: codecov/codecov-action@v4
      #   with:
      #     file: target/coverage/cobertura.xml

      - name: Archive coverage results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage-report
          path: |
            target/coverage/cobertura.xml
            target/coverage/lcov.info
            target/coverage/report/
          retention-days: 30

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Security Audit
        uses: actions-rs/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build-cli:
    name: Build CLI - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: [format, clippy, test, coverage]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary-suffix: ""
            use-cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary-suffix: ""
            use-cross: true
          - target: x86_64-apple-darwin
            os: macos-15-intel # Intel runners
            binary-suffix: ""
            use-cross: false
          - target: aarch64-apple-darwin
            os: macos-latest # Apple Silicon runners
            binary-suffix: ""
            use-cross: false

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build CLI natively with xtask
        if: ${{ !matrix.use-cross }}
        run: cargo xtask build-cli --release

      - name: Build CLI with cross-compilation
        if: ${{ matrix.use-cross }}
        uses: houseabsolute/actions-rust-cross@v1
        with:
          target: ${{ matrix.target }}
          command: build
          args: "--locked --release --bin logcheck-filter"
          strip: true
          use-rust-cache: true

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v6
        with:
          name: logcheck-filter-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/logcheck-filter${{ matrix.binary-suffix }}
          retention-days: 30

  build-wasm:
    name: Build WASM Filter
    runs-on: ubuntu-latest
    needs: [format, clippy, test, coverage]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-unknown-unknown

      - name: Build WASM filter with xtask
        run: cargo xtask build-wasm --release

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v6
        with:
          name: fluentbit-wasm-filter
          path: target/wasm32-unknown-unknown/release/logcheck_fluent_bit_filter.wasm
          retention-days: 30
