name: Build Arch Linux Packages

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-release-artifacts:
    name: Prepare release artifacts for Arch packages
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    outputs:
      pkgver: ${{ steps.resolve-version.outputs.pkgver }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve package version
        id: resolve-version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "pkgver=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved pkgver=${VERSION}"

      - name: Download CLI release assets
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for attempt in {1..10}; do
            if curl -fsSL -o logcheck-filter-linux-amd64.tar.gz \
              "https://github.com/Finkregh/fluent-bit-logcheck/releases/download/v${VERSION}/logcheck-filter-linux-amd64.tar.gz" \
              && curl -fsSL -o logcheck-filter-linux-arm64.tar.gz \
              "https://github.com/Finkregh/fluent-bit-logcheck/releases/download/v${VERSION}/logcheck-filter-linux-arm64.tar.gz" \
              && curl -fsSL -o fluentbit-wasm-filter.tar.gz \
              "https://github.com/Finkregh/fluent-bit-logcheck/releases/download/v${VERSION}/fluentbit-wasm-filter.tar.gz"; then
              break
            fi
            echo "Release assets not ready yet. Retry ${attempt}/10..."
            sleep 15
          done

          [[ -f "logcheck-filter-linux-amd64.tar.gz" ]] || exit 1
          [[ -f "logcheck-filter-linux-arm64.tar.gz" ]] || exit 1
          [[ -f "fluentbit-wasm-filter.tar.gz" ]] || exit 1

      - name: Download source tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for attempt in {1..10}; do
            if curl -fsSL -o "fluent-bit-logcheck-${VERSION}.tar.gz" \
              "https://github.com/Finkregh/fluent-bit-logcheck/archive/refs/tags/v${VERSION}.tar.gz"; then
              break
            fi
            echo "Source tarball not ready yet. Retry ${attempt}/10..."
            sleep 15
          done

          [[ -f "fluent-bit-logcheck-${VERSION}.tar.gz" ]] || exit 1

      - name: Upload release assets for reuse
        uses: actions/upload-artifact@v6
        with:
          name: archlinux-release-assets
          path: |
            logcheck-filter-linux-amd64.tar.gz
            logcheck-filter-linux-arm64.tar.gz
            fluentbit-wasm-filter.tar.gz
            fluent-bit-logcheck-*.tar.gz
          retention-days: 1

  build-logcheck-filter-pkg:
    name: Build logcheck-filter-git Package
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v6

      - name: Generate PKGBUILDs
        run: bash ./pkgbuild/generate-pkgbuilds.sh

      - name: Set PKGBUILD version from tag (git)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          sed -i "s/^pkgver=.*/pkgver=${GITHUB_REF_NAME#v}/" \
            pkgbuild/logcheck-filter-git/PKGBUILD

      - name: Update PKGBUILD source reference (git)
        run: |
          # Determine the git reference (branch or tag)
          case "$GITHUB_REF" in
            refs/tags/*)
              GIT_REF="$GITHUB_REF_NAME"
              REF_TYPE="tag"
              ;;
            refs/heads/*)
              GIT_REF="$GITHUB_REF_NAME"
              REF_TYPE="branch"
              ;;
            *)
              GIT_REF="$GITHUB_HEAD_REF"
              REF_TYPE="branch"
              ;;
          esac

          echo "Git reference: $GIT_REF (type: $REF_TYPE)"

          if [[ "$GIT_REF" != "main" ]]; then
            echo "Updating PKGBUILD source reference to use $REF_TYPE=$GIT_REF"
            sed -i "s|source=(\"\\${_pkgname}::git+\$url.git\")|source=(\"\\${_pkgname}::git+\$url.git#${REF_TYPE}=${GIT_REF}\")|g" \
              pkgbuild/logcheck-filter-git/PKGBUILD
            echo "Updated PKGBUILD:"
            grep "^source=" pkgbuild/logcheck-filter-git/PKGBUILD
          else
            echo "On main branch, keeping default source reference"
          fi

      - name: Update .SRCINFO
        uses: ./.github/actions/archlinux-run
        with:
          command: pacman -Sy --noconfirm pacman-contrib && bash ./pkgbuild/update-srcinfo.sh logcheck-filter-git

      - name: Upload updated PKGBUILD metadata
        uses: actions/upload-artifact@v6
        with:
          name: logcheck-filter-git-metadata-${{ github.run_id }}
          path: |
            pkgbuild/logcheck-filter-git/PKGBUILD
            pkgbuild/logcheck-filter-git/.SRCINFO
          retention-days: 30

      - name: Build logcheck-filter-git package
        uses: ouuan/pkgbuild-action@master
        id: build-logcheck-filter
        with:
          path: pkgbuild/logcheck-filter-git

      - name: Namcap built logcheck-filter-git package
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/archlinux-run
        with:
          command: pacman -Sy --noconfirm namcap && namcap ${{ steps.build-logcheck-filter.outputs.pkgfile }}

      - name: Upload logcheck-filter-git package
        uses: actions/upload-artifact@v6
        with:
          name: logcheck-filter-git-pkg-${{ github.run_id }}
          path: ${{ steps.build-logcheck-filter.outputs.pkgfile }}
          retention-days: 30

  build-fluent-bit-filter-pkg:
    name: Build fluent-bit-logcheck-filter-git Package
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v6

      - name: Generate PKGBUILDs
        run: bash ./pkgbuild/generate-pkgbuilds.sh

      - name: Set PKGBUILD version from tag (git)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          sed -i "s/^pkgver=.*/pkgver=${GITHUB_REF_NAME#v}/" \
            pkgbuild/fluent-bit-logcheck-filter-git/PKGBUILD

      - name: Update PKGBUILD source reference (git)
        run: |
          case "$GITHUB_REF" in
            refs/tags/*)
              GIT_REF="$GITHUB_REF_NAME"
              REF_TYPE="tag"
              ;;
            refs/heads/*)
              GIT_REF="$GITHUB_REF_NAME"
              REF_TYPE="branch"
              ;;
            *)
              GIT_REF="$GITHUB_HEAD_REF"
              REF_TYPE="branch"
              ;;
          esac

          echo "Git reference: $GIT_REF (type: $REF_TYPE)"

          if [[ "$GIT_REF" != "main" ]]; then
            echo "Updating PKGBUILD source reference to use $REF_TYPE=$GIT_REF"
            sed -i "s|source=(\"\\${_pkgname}::git+\$url.git\")|source=(\"\\${_pkgname}::git+\$url.git#${REF_TYPE}=${GIT_REF}\")|g" \
              pkgbuild/fluent-bit-logcheck-filter-git/PKGBUILD
            echo "Updated PKGBUILD:"
            grep "^source=" pkgbuild/fluent-bit-logcheck-filter-git/PKGBUILD
          else
            echo "On main branch, keeping default source reference"
          fi

      - name: Update .SRCINFO
        uses: ./.github/actions/archlinux-run
        with:
          command: pacman -Sy --noconfirm pacman-contrib && bash ./pkgbuild/update-srcinfo.sh fluent-bit-logcheck-filter-git

      - name: Upload updated PKGBUILD metadata
        uses: actions/upload-artifact@v6
        with:
          name: fluent-bit-logcheck-filter-git-metadata-${{ github.run_id }}
          path: |
            pkgbuild/fluent-bit-logcheck-filter-git/PKGBUILD
            pkgbuild/fluent-bit-logcheck-filter-git/.SRCINFO
          retention-days: 30

      - name: Build fluent-bit-logcheck-filter-git package
        uses: ouuan/pkgbuild-action@master
        id: build-fluent-bit-filter
        with:
          path: pkgbuild/fluent-bit-logcheck-filter-git

      - name: Namcap built fluent-bit-logcheck-filter-git package
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/archlinux-run
        with:
          command: pacman -Sy --noconfirm namcap && namcap ${{ steps.build-fluent-bit-filter.outputs.pkgfile }}

      - name: Upload fluent-bit-logcheck-filter-git package
        uses: actions/upload-artifact@v6
        with:
          name: fluent-bit-logcheck-filter-git-pkg-${{ github.run_id }}
          path: ${{ steps.build-fluent-bit-filter.outputs.pkgfile }}
          retention-days: 30

  build-logcheck-database-pkg:
    name: Build logcheck-database Package
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v6

      - name: Generate PKGBUILDs
        run: bash ./pkgbuild/generate-pkgbuilds.sh

      - name: Set logcheck-database version from Debian index
        run: |
          VERSION=$(curl -fsSL "https://deb.debian.org/debian/pool/main/l/logcheck/" \
            | grep -oE 'logcheck-database_[0-9]+(\.[0-9]+)+_all\.deb' \
            | sed -E 's/logcheck-database_([0-9.]+)_all\.deb/\1/' \
            | sort -V | tail -n 1)
          echo "Latest Debian logcheck-database version: ${VERSION}"
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" pkgbuild/logcheck-database/PKGBUILD

      - name: Update checksums
        uses: ./.github/actions/archlinux-run
        with:
          command: pacman -Sy --noconfirm pacman-contrib && bash ./pkgbuild/update-checksums.sh logcheck-database

      - name: Update .SRCINFO
        uses: ./.github/actions/archlinux-run
        with:
          command: pacman -Sy --noconfirm pacman-contrib && bash ./pkgbuild/update-srcinfo.sh logcheck-database

      - name: Upload updated PKGBUILD metadata
        uses: actions/upload-artifact@v6
        with:
          name: logcheck-database-metadata-${{ github.run_id }}
          path: |
            pkgbuild/logcheck-database/PKGBUILD
            pkgbuild/logcheck-database/.SRCINFO
          retention-days: 30

      - name: Build logcheck-database package
        uses: ouuan/pkgbuild-action@master
        id: build-logcheck-database
        with:
          path: pkgbuild/logcheck-database

      - name: Namcap built logcheck-database package
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/archlinux-run
        with:
          command: pacman -Sy --noconfirm namcap && namcap ${{ steps.build-logcheck-database.outputs.pkgfile }}

      - name: Upload logcheck-database package
        uses: actions/upload-artifact@v6
        with:
          name: logcheck-database-pkg-${{ github.run_id }}
          path: ${{ steps.build-logcheck-database.outputs.pkgfile }}
          retention-days: 30

  build-logcheck-filter-bin-pkg:
    name: Build logcheck-filter-bin Package
    runs-on: ubuntu-latest
    needs: build-release-artifacts
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6

      - name: Download release assets
        uses: actions/download-artifact@v6
        with:
          name: archlinux-release-assets

      - name: Generate PKGBUILDs
        run: bash ./pkgbuild/generate-pkgbuilds.sh

      - name: Set PKGBUILD version from tag (bin)
        run: |
          sed -i "s/^pkgver=.*/pkgver=${GITHUB_REF_NAME#v}/" \
            pkgbuild/logcheck-filter-bin/PKGBUILD

      - name: Update checksums (offline)
        uses: ./.github/actions/archlinux-run
        with:
          command: pacman -Sy --noconfirm pacman-contrib && SRCDEST=/workspace bash ./pkgbuild/update-checksums.sh logcheck-filter-bin

      - name: Update .SRCINFO
        uses: ./.github/actions/archlinux-run
        with:
          command: pacman -Sy --noconfirm pacman-contrib && bash ./pkgbuild/update-srcinfo.sh logcheck-filter-bin

      - name: Upload updated PKGBUILD metadata
        uses: actions/upload-artifact@v6
        with:
          name: logcheck-filter-bin-metadata-${{ github.run_id }}
          path: |
            pkgbuild/logcheck-filter-bin/PKGBUILD
            pkgbuild/logcheck-filter-bin/.SRCINFO
          retention-days: 30

      - name: Build logcheck-filter-bin package
        uses: ouuan/pkgbuild-action@master
        id: build-logcheck-filter-bin
        with:
          path: pkgbuild/logcheck-filter-bin

      - name: Namcap built logcheck-filter-bin package
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/archlinux-run
        with:
          command: pacman -Sy --noconfirm namcap && namcap ${{ steps.build-logcheck-filter-bin.outputs.pkgfile }}

      - name: Upload logcheck-filter-bin package
        uses: actions/upload-artifact@v6
        with:
          name: logcheck-filter-bin-pkg-${{ github.run_id }}
          path: ${{ steps.build-logcheck-filter-bin.outputs.pkgfile }}
          retention-days: 30

  build-fluent-bit-filter-bin-pkg:
    name: Build fluent-bit-logcheck-filter-bin Package
    runs-on: ubuntu-latest
    needs: build-release-artifacts
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6

      - name: Download release assets
        uses: actions/download-artifact@v6
        with:
          name: archlinux-release-assets

      - name: Generate PKGBUILDs
        run: bash ./pkgbuild/generate-pkgbuilds.sh

      - name: Set PKGBUILD version from tag (bin)
        run: |
          sed -i "s/^pkgver=.*/pkgver=${GITHUB_REF_NAME#v}/" \
            pkgbuild/fluent-bit-logcheck-filter-bin/PKGBUILD

      - name: Update checksums (offline)
        uses: ./.github/actions/archlinux-run
        with:
          command: pacman -Sy --noconfirm pacman-contrib && SRCDEST=/workspace bash ./pkgbuild/update-checksums.sh fluent-bit-logcheck-filter-bin

      - name: Update .SRCINFO
        uses: ./.github/actions/archlinux-run
        with:
          command: pacman -Sy --noconfirm pacman-contrib && bash ./pkgbuild/update-srcinfo.sh fluent-bit-logcheck-filter-bin

      - name: Upload updated PKGBUILD metadata
        uses: actions/upload-artifact@v6
        with:
          name: fluent-bit-logcheck-filter-bin-metadata-${{ github.run_id }}
          path: |
            pkgbuild/fluent-bit-logcheck-filter-bin/PKGBUILD
            pkgbuild/fluent-bit-logcheck-filter-bin/.SRCINFO
          retention-days: 30

      - name: Build fluent-bit-logcheck-filter-bin package
        uses: ouuan/pkgbuild-action@master
        id: build-fluent-bit-filter-bin
        with:
          path: pkgbuild/fluent-bit-logcheck-filter-bin

      - name: Namcap built fluent-bit-logcheck-filter-bin package
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/archlinux-run
        with:
          command: pacman -Sy --noconfirm namcap && namcap ${{ steps.build-fluent-bit-filter-bin.outputs.pkgfile }}

      - name: Upload fluent-bit-logcheck-filter-bin package
        uses: actions/upload-artifact@v6
        with:
          name: fluent-bit-logcheck-filter-bin-pkg-${{ github.run_id }}
          path: ${{ steps.build-fluent-bit-filter-bin.outputs.pkgfile }}
          retention-days: 30



  package-summary:
    name: Package Build Summary
    runs-on: ubuntu-latest
    needs:
      [
        build-logcheck-filter-bin-pkg,
        build-fluent-bit-filter-bin-pkg,
        build-logcheck-filter-pkg,
        build-fluent-bit-filter-pkg,
        build-logcheck-database-pkg,
      ]
    if: always()
    permissions:
      contents: read
      pull-requests: write # Required for PR comments
    steps:
      - uses: actions/checkout@v6

      - name: Generate package summary
        run: |
          {
            echo "# 📦 Arch Linux Package Build Summary"
            echo ""
            echo "Build completed for commit \`${{ github.sha }}\`"
            echo ""
            echo "## Package Status"
            echo ""

            # Check job statuses
            if [[ "${{ needs.build-logcheck-filter-pkg.result }}" == "success" ]]; then
              echo "✅ **logcheck-filter-git**: Built successfully"
            else
              echo "❌ **logcheck-filter-git**: Build failed"
            fi

            if [[ "${{ needs.build-logcheck-filter-bin-pkg.result }}" == "success" ]]; then
              echo "✅ **logcheck-filter-bin**: Built successfully"
            elif [[ "${{ needs.build-logcheck-filter-bin-pkg.result }}" == "skipped" ]]; then
              echo "⏭️ **logcheck-filter-bin**: Skipped (not a release tag)"
            else
              echo "❌ **logcheck-filter-bin**: Build failed"
            fi

            if [[ "${{ needs.build-fluent-bit-filter-pkg.result }}" == "success" ]]; then
              echo "✅ **fluent-bit-logcheck-filter-git**: Built successfully"
            else
              echo "❌ **fluent-bit-logcheck-filter-git**: Build failed"
            fi

            if [[ "${{ needs.build-fluent-bit-filter-bin-pkg.result }}" == "success" ]]; then
              echo "✅ **fluent-bit-logcheck-filter-bin**: Built successfully"
            elif [[ "${{ needs.build-fluent-bit-filter-bin-pkg.result }}" == "skipped" ]]; then
              echo "⏭️ **fluent-bit-logcheck-filter-bin**: Skipped (not a release tag)"
            else
              echo "❌ **fluent-bit-logcheck-filter-bin**: Build failed"
            fi

            if [[ "${{ needs.build-logcheck-database-pkg.result }}" == "success" ]]; then
              echo "✅ **logcheck-database**: Built successfully"
            else
              echo "❌ **logcheck-database**: Build failed"
            fi

            echo ""
            echo "## Installation"
            echo ""
            echo "Download the built packages from the workflow artifacts and install with:"
            echo ""
            echo '```bash'
            echo "# Install all packages"
            echo "sudo pacman -U logcheck-filter-git-*.pkg.tar.zst \\" 
            echo "               logcheck-filter-bin-*.pkg.tar.zst \\" 
            echo "               fluent-bit-logcheck-filter-git-*.pkg.tar.zst \\" 
            echo "               fluent-bit-logcheck-filter-bin-*.pkg.tar.zst \\" 
            echo "               logcheck-database-*.pkg.tar.zst"
            echo ""
            echo "# Or install individually as needed"
            echo "sudo pacman -U logcheck-filter-git-*.pkg.tar.zst"
            echo '```'
            echo ""
            echo "---"
            echo "*Generated on $(date)*"
          } > package-summary.md

      - name: Comment PR with package summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');

            try {
              const summary = fs.readFileSync('package-summary.md', 'utf8');
              
              // Look for existing comment to update instead of creating new ones
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              
              const botComment = comments.data.find(comment => 
                comment.user.type === 'Bot' && 
                comment.body.includes('📦 Arch Linux Package Build Summary')
              );
              
              if (botComment) {
                // Update existing comment
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body: summary
                });
                console.log('Updated existing package build summary comment');
              } else {
                // Create new comment
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: summary
                });
                console.log('Created new package build summary comment');
              }
            } catch (error) {
              console.error('Error posting package summary:', error);
              // Don't fail the job if comment posting fails
              core.warning('Failed to post PR comment, but package builds completed');
            }

      - name: Archive package summary
        uses: actions/upload-artifact@v6
        with:
          name: package-build-summary
          path: package-summary.md
          retention-days: 30
