name: Release-plz

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_override:
        description: "Override version (e.g. 1.2.3 or crate@1.2.3)"
        required: false
        type: string

jobs:
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      prs_created: ${{ steps.release-plz.outputs.prs_created }}
      pr: ${{ steps.release-plz.outputs.pr }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install release-plz CLI
        if: ${{ inputs.version_override }}
        run: cargo install release-plz --locked

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Set manual version
        if: ${{ inputs.version_override }}
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version_override }}"
          # If the input already specifies package-qualified or multiple versions, pass through
          if [[ "$VERSION" == *"@"* || "$VERSION" == *" "* ]]; then
            echo "Using provided version spec: $VERSION"
            release-plz set-version "$VERSION"
          else
            echo "Expanding single version to all workspace packages via cargo metadata"
            # Get workspace package names (no dependencies)
            PACKAGES=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[].name')
            # Build arguments: <package>@<version> for each package
            ARGS=""
            for pkg in $PACKAGES; do
              ARGS="$ARGS $pkg@$VERSION"
            done
            echo "Setting versions for: $ARGS"
            release-plz set-version $ARGS
          fi

      - name: Run release-plz (release PR)
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  update-pkgbuild:
    name: Update PKGBUILD files
    runs-on: ubuntu-latest
    needs: release-plz-pr
    if: needs.release-plz-pr.outputs.prs_created == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Checkout release-plz PR branch
        env:
          PR: ${{ needs.release-plz-pr.outputs.pr }}
        run: |
          pr_branch=$(echo "$PR" | jq -r '.head_branch')
          git fetch origin "$pr_branch"
          git checkout "$pr_branch"

      - name: Update PKGBUILD and .SRCINFO
        env:
          PR: ${{ needs.release-plz-pr.outputs.pr }}
        run: |
          echo "$PR" > /tmp/release-plz-pr.json
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v /tmp/release-plz-pr.json:/tmp/release-plz-pr.json \
            -w /workspace \
            archlinux:latest \
            bash -lc "./scripts/update-pkgbuild-version.sh /tmp/release-plz-pr.json"

      - name: Commit PKGBUILD updates
        run: |
          if git status --porcelain | grep -q .; then
            git config user.name "release-plz[bot]"
            git config user.email "release-plz[bot]@users.noreply.github.com"
            git add pkgbuild/**/PKGBUILD pkgbuild/**/.SRCINFO
            git commit -m "chore: update PKGBUILD versions"
            git push origin HEAD
          else
            echo "No PKGBUILD updates to commit"
          fi

  release-plz-release:
    name: Release-plz Release
    runs-on: ubuntu-latest
    needs: release-plz-pr
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Run release-plz (release)
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
