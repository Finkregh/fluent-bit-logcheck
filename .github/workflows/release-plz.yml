name: Release-plz

on:
  push:
    branches:
      - main

jobs:
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      prs_created: ${{ steps.release-plz.outputs.prs_created }}
      pr: ${{ steps.release-plz.outputs.pr }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run release-plz (release PR)
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  update-pkgbuild:
    name: Update PKGBUILD files
    runs-on: ubuntu-latest
    needs: release-plz-pr
    if: needs.release-plz-pr.outputs.prs_created == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Checkout release-plz PR branch
        env:
          PR: ${{ needs.release-plz-pr.outputs.pr }}
        run: |
          pr_branch=$(echo "$PR" | jq -r '.head_branch')
          git fetch origin "$pr_branch"
          git checkout "$pr_branch"

      - name: Update PKGBUILD and .SRCINFO
        env:
          PR: ${{ needs.release-plz-pr.outputs.pr }}
        run: |
          echo "$PR" > /tmp/release-plz-pr.json
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v /tmp/release-plz-pr.json:/tmp/release-plz-pr.json \
            -w /workspace \
            archlinux:latest \
            bash -lc "pacman -Sy --noconfirm base-devel git jq && ./scripts/update-pkgbuild-version.sh /tmp/release-plz-pr.json"

      - name: Commit PKGBUILD updates
        run: |
          if git status --porcelain | grep -q .; then
            git config user.name "release-plz[bot]"
            git config user.email "release-plz[bot]@users.noreply.github.com"
            git add pkgbuild/**/PKGBUILD pkgbuild/**/.SRCINFO
            git commit -m "chore: update PKGBUILD versions"
            git push origin HEAD
          else
            echo "No PKGBUILD updates to commit"
          fi

  release-plz-release:
    name: Release-plz Release
    runs-on: ubuntu-latest
    needs: release-plz-pr
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz (release)
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
